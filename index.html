<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的页面</title>
    <style>
        /* ---------- 全局重置，让页面铺满全屏 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- body 使用 Flexbox 居中 ---------- */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;  /* 水平居中 */
            align-items: center;      /* 垂直居中 */
            background: #f0f2f5;      /* 淡灰色背景，衬托白色卡片 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;            /* 小屏幕上留点边距 */
            transition: background-color 0.3s;
        }

        /* ---------- 暗黑模式 body ---------- */
        body.dark-mode {
            background: #121212;
        }

        /* ---------- 白色卡片 ---------- */
        .card {
            background: #ffffff;
            padding: 48px 40px;       /* 内边距，让内容不贴着边 */
            border-radius: 20px;      /* 圆角 */
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08); /* 柔和阴影，更专业 */
            max-width: 720px;         /* 限制最大宽度，太宽不好看 */
            width: 100%;
            text-align: center;       /* 让文字居中 */
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        /* 鼠标悬停时阴影略微加深，增加互动感 */
        .card:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        /* ---------- 暗黑模式卡片 ---------- */
        body.dark-mode .card {
            background: #1e1e1e;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        body.dark-mode .card:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* ---------- 卡片内部的一些默认样式（可选） ---------- */
        .card h1 {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #1a1a2e;
            transition: color 0.3s;
        }

        body.dark-mode .card h1 {
            color: #e0e0e0;
        }

        .card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a4a5a;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        body.dark-mode .card p {
            color: #aaaaaa;
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 12px;
        }

        /* ---------- 暗黑模式切换按钮 ---------- */
        .dark-toggle {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 2px solid #1a1a2e;
            background: transparent;
            color: #1a1a2e;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: #1a1a2e;
            color: #ffffff;
        }

        body.dark-mode .dark-toggle {
            border-color: #e0e0e0;
            color: #e0e0e0;
        }

        body.dark-mode .dark-toggle:hover {
            background: #e0e0e0;
            color: #121212;
        }

        /* ---------- 状态提示文字 ---------- */
        .mode-status {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #888;
            transition: color 0.3s;
        }

        body.dark-mode .mode-status {
            color: #777;
        }

        /* 小屏手机适配 */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px;
            }
            .card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 卡片容器：把你的所有内容都放在这个 div 里 -->
    <div class="card">
        <!-- ================================= -->
        <!-- 你的所有内容从这里开始，直接替换即可 -->
        <h1>你好，世界！</h1>
        <p>这是我的第一个网页。</p>
        <p>现在它已经居中并且有漂亮的卡片效果了</p>

        <!-- 暗黑模式切换按钮 -->
        <button class="dark-toggle" id="darkModeToggle">暗黑模式</button>
        <div class="mode-status" id="modeStatus">当前: 明亮模式</div>
        <!-- ================================= -->
    </div>

    <script>
        (function() {
            var toggleBtn = document.getElementById('darkModeToggle');
            var statusText = document.getElementById('modeStatus');

            // 检查 localStorage 中的偏好
            var savedMode = localStorage.getItem('darkMode');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedMode === 'enabled' || (savedMode === null && prefersDark)) {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = '明亮模式';
                statusText.textContent = '当前: 暗黑模式';
            }

            toggleBtn.addEventListener('click', function() {
                var isDark = document.body.classList.toggle('dark-mode');

                if (isDark) {
                    toggleBtn.textContent = '明亮模式';
                    statusText.textContent = '当前: 暗黑模式';
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    toggleBtn.textContent = '暗黑模式';
                    statusText.textContent = '当前: 明亮模式';
                    localStorage.setItem('darkMode', 'disabled');
                }
            });
        })();
    </script>
</body>
</html>
